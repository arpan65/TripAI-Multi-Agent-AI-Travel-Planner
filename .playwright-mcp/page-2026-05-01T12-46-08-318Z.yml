                      - generic [ref=e2232]:
                        - generic [ref=e2235] [cursor=pointer]: "The park is a great spot to visit the southermost tip of Canada Park activities include: Visitor centre - cute gift shop and informative activity centre Tip trail - shuttles are every 20mins from the visitor centre - trail takes 10mins on road and beach to get to the tip Shuster trail - takes you to a nice beach spot Tilden Woods Trail - decent wooded trail, good for birding, fall colours and a nice momento to show how saving trees and forests can help Boardwalk @ Marsh - tower @ front is great for photos, the rest is a boardwalk along the marsh and is stroller friendly All the trails were pretty short and straightforward and pretty stroller friendly and its nice as the weather is pretty good since its pretty south."

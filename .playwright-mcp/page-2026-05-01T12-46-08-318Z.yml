                      - generic [ref=e2177]:
                        - generic [ref=e2180] [cursor=pointer]: Glad I came down here and visited this park but you won’t need more than a day or two to see everything. Located in a less visited part of Canada. About an hour drive from the Detroit/Windsor border and 3.5-4 hours from Toronto. If not here during bird or butterfly migration season, found there are two main things to do. One, rent a kayak or walk the boardwalk in the marsh area and, two, take the shuttle tram to Canada’s Southernmost point. The kayak rental is located in the marsh boardwalk parking lot and opens at 10 daily. Can rent a double kayak for $35 for the first hour and $15 for each additional hour or a single kayak for $25/$15. Beautiful kayaking through the marsh, which opens up into a large lake. Can paddle to the east side of the Peninsula, where there is a beach. Took us about two hours to kayak out to the beach and come back. The tram to the point leaves from the visitors center at the end of the park road and runs about every fifteen minutes beginning at 10 AM. Short ten minute walk to the point. It is only 4600 KM from here to Canada’s Northernmost point! The southernmost point is a spit of sandy land surrounded by Lake Erie. At this point you are about as far South as some of the southern suburbs of Detroit and across the lake, due South, is Sandusky, Ohio. We also went to the swimming beaches but found the sand full of rocks and pebbles and not very comfortable to walk on. Even with water shoes, the pebbles got into our shoes. There are definitely better Great Lakes beaches than these. Water was a nice temperature at the beginning of July. Best beach facilities were at the Northwest beach, which were newer and included changing rooms and outdoor showers.

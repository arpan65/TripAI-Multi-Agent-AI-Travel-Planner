                      - generic [ref=e2342]:
                        - generic [ref=e2345] [cursor=pointer]: Absolutely stunning national park in early fall. Facilities are clean and visitor centre is worth a visit over a few days. Gets filled up for parking on weekends so arrive early to avoid the crowds. Only 1 gate in so can get busy. The trails are well maintained and easy to walk. Beaches are lovely. Lots of wildlife - butterflies, snakes, turtles, frogs, herons and birds but stable flies at the tip in the fall are annoying. The tram to the trip is an attraction itself. The boardwalks beautiful. Bike and watercraft rentals available. Love, love, love.

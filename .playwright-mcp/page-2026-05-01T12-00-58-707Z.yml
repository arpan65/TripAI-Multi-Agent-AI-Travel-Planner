        - paragraph [ref=e162]: With convenient departure times, Megabus makes planning your next Toronto to Montreal trip simple.
        - paragraph [ref=e163]: Keep track of your Toronto to Montreal itinerary online, easily accessible from your smartphone.
        - heading "Bus stop locations and drop-off locations in Toronto & Montreal" [level=2] [ref=e164]
        - paragraph [ref=e165]: Whether you’re travelling by bus from Toronto to Montreal or vice versa, you will be centrally located for hotels, restaurants, and public transit when you arrive.

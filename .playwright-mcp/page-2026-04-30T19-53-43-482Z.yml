                        - generic [ref=e7652] [cursor=pointer]: Lights show accompanied by music in the beautiful Notre-Dame Basilica in Montreal. The show is cool, it takes around 25 minutes (although the website reports that it lasts 40-45 but it really is not the case). Come early to get a good place (the middle of the church is ideal). It is forbidden to film during the show (even), warn several times and there is surveillance after the event begins. Remember it'll be dark, so it's easy to see if someone is joking. Don't be you doing this. It is necessary to purchase first online.

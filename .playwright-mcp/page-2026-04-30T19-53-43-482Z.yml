                      - generic [ref=e7814]:
                        - generic [ref=e7817] [cursor=pointer]: If you want fast food (Subway, Sushi, Thai, Bagels) the 1000 de la Gauchetiere “Patinoire” Atrium terminus is the coolest. It’s right above Bonaventure station on the orange line. With parking below and a solarium/skating rink, you’ll have the brightest and sparkling view. The Quebecois sure like their winter sports! It’s easy to grab a seat and enjoy the ride or view. Not far from the cenotaph or Mary Queen of the world Cathedral and Gare Central Montreal Via Rail station, this is the next best thing (in room temperature) to being in the great outdoors!

                      - generic [ref=e7437]:
                        - generic [ref=e7440] [cursor=pointer]: Near the centre of old First Nations’ Hochelaga inside McGill campus’ Roddick Gates (845 Sherbrooke St Ouest) is Rue University/Robert Bourassa Boulevard and the East entrance of Eatons, across from the Linen Chest and Cafe Olimpico. The historic mall stretches underground from there (Laura’s by Sephora), all the way to Simons Shopping Department Store, next to Zara’s. That makes for 3 full city blocks of indoor shopping malls, connected below Decathlon Outdoor Centre. Even though the old Bay’s department store building now sits vacant, next to Eaton’s, it’s still a formidable commercial complex and movie Cineplex theatre along St. Catherine West. Facing two storeys of Nike’s or B2 shoes is Poulet Rouge, a local franchise that’s healthier than Chipotle (mix & match chicken flavours or spice with your choice of 7 salad add-ons over quinoa or rice. It’s open even after the basement food court closes around 6:30. Even though Toronto’s Yorkdale is the oldest indoor mall in North America and West Edmonton is the largest in the world, Eaton’s Centre is a landmark in Montreal. Its proximity to McGill university, Mont Royal’s illuminated cross overlooking the Hochelaga/campus (stairs behind Royal Victoria Hospital), and other national sites like Notre Dame Cathedral at old Vieux Port (South of McGill Metro station) make for one familiar and unique, busking kind of city. Dine in the top-floor Market, and in winter, visit Simons first for fleeced sheer-effect winter tights to get ready to dance the night away or watch holiday fireworks!

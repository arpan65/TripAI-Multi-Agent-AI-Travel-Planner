                      - generic [ref=e7382]:
                        - generic [ref=e7385] [cursor=pointer]: I am a worldwide slot gambler since 1976, since it opened in 1989 I noticed low periods in the 90s and here and there but today I rate it as one of the best in the world. The slots are extremely varied, the staff very friendly and the Rtp I estimate at 92% which is average. I love the labyrinth layout very absorbing and free non alcohol drinks including some great coffee and soft drinks with the right fizz. Love the 22$ buffet weekdays, this is the best quality lowest priced buffet in the world believe me. L'instant makes the best club sandwiches and priced just right. The noise of slots is the music I want I never go with bands and stuff. 3000 slots for sure. Table minimums are too high but a 4.5 million population city with one casino gets you there. I love this casino and parking is super well organized and easy. Pretty staff and very polite.The best I would say since 1989. I have read with dismay the negative critics and trust me none of these apply in my book and I am what you could call a professional slot player and lover of casinos. If you gamble this is slot paradise to wander the floors labyrinth.If you like tables go to Kanawahke which is quite impressive. If you want vegas glitter and noise go to vegas for you 120$ lunch buffets and now empty casino floors.

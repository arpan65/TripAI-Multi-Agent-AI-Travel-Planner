                      - generic [ref=e7327]:
                        - generic [ref=e7330] [cursor=pointer]: Our tour group was staying at the Fairmont Queen Elizabeth Hotel and walked down to the train station to await our train to Quebec City. There were plenty of dining options around and in the nearby food courts and underground passages. It was near Christmas and some costumed dancers were entertaining the passengers and giving out candy. We appreciated some of the classic-looking decor and what looked like a display with lyrics of the Canadian National Anthem. Overall, a good travel experience for us.

                      - generic [ref=e7594]:
                        - generic [ref=e7597] [cursor=pointer]: "Everything is well connected – you can travel for hours without even having to go outdoors. The trails are very well signposted so you can easily find your way around, and the mix of shops, cafes, restaurants and cultural facilities makes the tour varied. We particularly liked the fact that it is not just a shopping mall: In between you can discover small art installations, have a coffee or simply admire the architecture. Even in bad weather it is pleasant here, as you can see a lot of the city at the same time and do not have to worry about rain or cold. For us, the visit was an exciting and relaxed experience – perfect for getting to know Montreal from an unusual perspective."

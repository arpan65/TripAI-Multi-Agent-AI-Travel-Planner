                  - /url: https://www.rome2rio.com/redirects/attractions/?destinationUrl=http://en.wikipedia.org/wiki/Eden_Gardens&provider=Wikipedia&language=en&currency=CAD&requestId=019de040-1b0a-7435-81cb-0403ce45d769&uid=CATor20260430202603494uzdd&label=ep01:f:a:m:d
                  - text: Eden Gardens
                  - generic [ref=e270]: (Opens in a new window)
              - paragraph [ref=e271]: "Eden Gardens (Bengali: ইডেন গার্ডেন্স) is a cricket ground in Kolkata, India established in 1864. It is the home venue of the Bengal cricket team and the IPL franchise cricket team Kolkata Knight Riders, and is also a venue for Test, ODI and T20I matches of the India national cricket team. With a seating capacity of 66,349, it is the largest cricket stadium in India, and the second-largest cricket stadium in the world."
            - article [ref=e272]:
              - img "Maidan" [ref=e273]
              - heading "Maidan (Opens in a new window)" [level=5] [ref=e274]:
                - link "Maidan (Opens in a new window)" [ref=e275] [cursor=pointer]:
                  - /url: https://www.rome2rio.com/redirects/attractions/?destinationUrl=http://en.wikipedia.org/wiki/Maidan_(Kolkata)&provider=Wikipedia&language=en&currency=CAD&requestId=019de040-1b0a-7435-81cb-0403ce45d769&uid=CATor20260430202603494uzdd&label=ep01:f:a:m:d
                  - text: Maidan
                  - generic [ref=e276]: (Opens in a new window)
              - paragraph [ref=e277]: The Maidan (literally open field) also referred as Brigade Parade Ground is the largest urban park in Kolkata in the Indian state of West Bengal. It is a vast stretch of field and home to numerous play grounds, including the famous cricketing venue Eden Gardens, several football stadia, and Kolkata Race Course. The Maidan is dotted with statues and pieces of architecture, most notable being the Victoria Memorial. Due to the freshness and greenery it provides to the metropolis, it has been referred to as the "lungs of Kolkata". The Maidan is a property of the Indian Army and hosts the Eastern zone high command of the Indian Army in Fort William. The Maidan stretches from as far north as the Raj Bhavan building in Esplanade and as far south as the National Library on Belvedere Rd. in Alipore. The wide field stretches from the Hoogly River on the west to the Victoria Memorial on the east. It is a historical and cultural center of Kolkata as well as a center of leisure and entertainment for Calcuttans.
